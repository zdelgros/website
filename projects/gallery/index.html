<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery — Decision Design Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
  <script defer src="/assets/scripts/main.js"></script>
</head>
<body>
  <nav class="site-nav">
    <div class="container">
      <a href="/" class="site-nav__logo">Decision Design Lab</a>
      <ul class="site-nav__links">
        <li><a href="/projects/">Projects</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/contact/">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="breadcrumb container">
    <a href="/projects/">&larr; Back to Projects</a>
  </div>

  <main class="container">
    <header class="page-header">
      <p class="label">Photography</p>
      <h1>Photo Gallery</h1>
    </header>

    <div class="gallery-container">
      <div class="masonry-grid">
        <div class="grid-item">
          <img src="/assets/images/DSC02475.JPG" alt="Photograph 1" class="clickable-image" data-src="/assets/images/DSC02475.JPG">
          <div class="overlay-text">Image 1</div>
        </div>
        <div class="grid-item">
          <img src="/assets/images/DSC02462.JPG" alt="Photograph 2" class="clickable-image" data-src="/assets/images/DSC02462.JPG">
          <div class="overlay-text">Image 2</div>
        </div>
        <div class="grid-item">
          <img src="/assets/images/DSC02439.JPG" alt="Photograph 3" class="clickable-image" data-src="/assets/images/DSC02439.JPG">
          <div class="overlay-text">Image 3</div>
        </div>
        <div class="grid-item">
          <img src="/assets/images/DSC02438.JPG" alt="Photograph 4" class="clickable-image" data-src="/assets/images/DSC02438.JPG">
          <div class="overlay-text">Image 4</div>
        </div>
        <div class="grid-item">
          <img src="/assets/images/DSC02433.JPG" alt="Photograph 5" class="clickable-image" data-src="/assets/images/DSC02433.JPG">
          <div class="overlay-text">Image 5</div>
        </div>
      </div>

      <div class="lightbox" id="lightbox">
        <span class="close-btn">&times;</span>
        <img class="lightbox-img" id="lightbox-img" alt="Full size photograph">
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span class="site-footer__copy">&copy; 2025 Decision Design Lab</span>
      <ul class="site-footer__links">
        <li><a href="https://github.com" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a></li>
        <li><a href="/contact/">Contact</a></li>
      </ul>
    </div>
  </footer>
</body>
</html>
