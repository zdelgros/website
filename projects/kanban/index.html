<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board — Decision Design Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
  <script defer src="/assets/scripts/main.js"></script>
  <script defer src="kanban.js"></script>
</head>
<body>
  <nav class="site-nav">
    <div class="container">
      <a href="/" class="site-nav__logo">Decision Design Lab</a>
      <ul class="site-nav__links">
        <li><a href="/projects/">Projects</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/contact/">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="breadcrumb container">
    <a href="/projects/">&larr; Back to Projects</a>
  </div>

  <main class="container">
    <header class="page-header">
      <p class="label">Tool</p>
      <h1>Kanban Board</h1>
    </header>

    <div class="kanban-container">
      <div class="kanban-board">
        <div class="kanban-column" id="todo">
          <h2>To Do</h2>
          <div class="task-list">
            <div class="task" id="task-1" draggable="true">Task 1</div>
            <div class="task" id="task-2" draggable="true">Task 2</div>
          </div>
        </div>
        <div class="kanban-column" id="in-progress">
          <h2>In Progress</h2>
          <div class="task-list"></div>
        </div>
        <div class="kanban-column" id="done">
          <h2>Done</h2>
          <div class="task-list"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span class="site-footer__copy">&copy; 2025 Decision Design Lab</span>
      <ul class="site-footer__links">
        <li><a href="https://github.com" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a></li>
        <li><a href="/contact/">Contact</a></li>
      </ul>
    </div>
  </footer>
</body>
</html>
